<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.5" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)" rx="12"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" rx="2"/>

  <!-- Logo: magnifying glass over a shield outline -->
  <g transform="translate(80, 70)">
    <!-- Shield outline -->
    <path d="M 60 10 L 110 30 L 110 80 Q 110 120 60 140 Q 10 120 10 80 L 10 30 Z"
          stroke="#58a6ff" stroke-width="2.5" fill="none" opacity="0.4"/>
    <!-- Magnifying glass circle -->
    <circle cx="60" cy="65" r="28" stroke="#58a6ff" stroke-width="3" fill="none" filter="url(#glow)"/>
    <!-- Magnifying glass handle -->
    <line x1="80" y1="85" x2="100" y2="105" stroke="#58a6ff" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Crosshair inside lens -->
    <line x1="60" y1="50" x2="60" y2="80" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>
    <line x1="45" y1="65" x2="75" y2="65" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>
    <!-- Dot in center -->
    <circle cx="60" cy="65" r="3" fill="#3fb950"/>
  </g>

  <!-- Title -->
  <text x="260" y="120" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700" fill="#f0f6fc" letter-spacing="-1.5">
    disclosure
    <tspan fill="#58a6ff">-</tspan>
    <tspan fill="#3fb950">scout</tspan>
  </text>

  <!-- Tagline -->
  <text x="262" y="158" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="17" fill="#8b949e" letter-spacing="0.3">
    Categorized search queries for bug bounty &amp; disclosure program discovery
  </text>

  <!-- Mini stats bar -->
  <g transform="translate(262, 185)">
    <rect x="0" y="0" width="105" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="52" y="17" font-family="monospace" font-size="13" fill="#3fb950" text-anchor="middle">299 queries</text>

    <rect x="117" y="0" width="120" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="177" y="17" font-family="monospace" font-size="13" fill="#58a6ff" text-anchor="middle">12 categories</text>

    <rect x="249" y="0" width="110" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="304" y="17" font-family="monospace" font-size="13" fill="#d2a8ff" text-anchor="middle">no keys needed</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="276" width="1200" height="4" fill="url(#accent)" rx="2"/>
</svg>
